<style>
:root {
  --primary: #12a594;
  --primary-dark: #0e8274;
  --surface: #ffffff;
  --background: #f4f6f8;
  --text: #1f2937;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --error: #ef4444;
  --hover: #f3f4f6;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
body { background-color: var(--background); color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }
.screen { display: none; height: 100%; width: 100%; flex-direction: column; position: absolute; top: 0; left: 0; }
.screen.active { display: flex; }

/* Login Screen - Premium UI */
#login-screen { 
  align-items: center; 
  justify-content: space-between; 
  padding: 0 24px; 
  background: linear-gradient(135deg, #e0f2f1 0%, #ffffff 100%);
}
.login-logo-wrapper {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  animation: fadeInDown 0.6s ease-out;
  padding-top: 20px;
}
.login-logo {
  width: 280px;
  max-width: 85%;
  height: auto;
  object-fit: contain;
}
.login-container { 
  width: 100%; 
  max-width: 400px; 
  display: flex; 
  flex-direction: column; 
  gap: 24px; 
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  padding: 40px 24px;
  border-radius: 24px;
  box-shadow: 0 10px 40px rgba(18, 165, 148, 0.1);
  border: 1px solid rgba(255,255,255,0.8);
  animation: fadeInUp 0.6s ease-out;
  flex: 0 0 auto;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
.login-header { text-align: center; }
.login-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
.login-header p { color: var(--text-secondary); font-size: 14px; }
.input-group { display: flex; flex-direction: column; gap: 8px; }
.input-group input { 
  padding: 16px; 
  border: 1px solid var(--border); 
  border-radius: 12px; 
  font-size: 16px; 
  outline: none; 
  background: #f8f9fa;
  transition: all 0.3s ease;
}
.input-group input:focus { 
  background: var(--surface);
  border-color: var(--primary); 
  box-shadow: 0 0 0 4px rgba(18, 165, 148, 0.1);
}
.btn { 
  padding: 16px 24px; 
  border: none; 
  border-radius: 12px; 
  font-size: 16px; 
  font-weight: 600; 
  cursor: pointer; 
  text-align: center; 
  transition: all 0.3s ease;
}
.btn-primary { 
  background: var(--primary); 
  color: white; 
  box-shadow: 0 4px 12px rgba(18, 165, 148, 0.3);
}
.btn-primary:active { 
  background: var(--primary-dark); 
  transform: translateY(2px);
  box-shadow: 0 2px 6px rgba(18, 165, 148, 0.3);
}
.login-footer { 
  flex: 1;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 24px;
  width: 100%;
  color: var(--text-secondary); 
  font-size: 14px; 
  font-weight: 500;
}
#login-error { color: var(--error); font-size: 14px; text-align: center; display: none; background: #fee2e2; padding: 12px; border-radius: 8px; }

/* Main App Screen */
.app-header { background: var(--surface); padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; z-index: 10; }
.top-bar { display: flex; justify-content: space-between; align-items: center; }
.icon-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.icon-btn:active { background: var(--hover); }
.search-container { position: relative; }
.search-container input { width: 100%; padding: 12px 16px 12px 44px; border: 1px solid var(--border); border-radius: 24px; font-size: 16px; outline: none; background: var(--hover); transition: all 0.3s; }
.search-container input:focus { background: var(--surface); border-color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
.filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.filter-chip { padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; font-weight: 500; white-space: nowrap; background: var(--surface); cursor: pointer; transition: all 0.2s; color: var(--text-secondary); }
.filter-chip.active { background: #e0f2f1; color: var(--primary-dark); border-color: var(--primary); }

/* Virtual List */
.list-container { flex: 1; overflow-y: auto; position: relative; -webkit-overflow-scrolling: touch; }
.list-phantom { position: absolute; top: 0; left: 0; width: 100%; z-index: -1; }
.list-content { position: absolute; top: 0; left: 0; width: 100%; }
.list-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); position: absolute; width: 100%; height: 72px; box-sizing: border-box; cursor: pointer; transition: background 0.2s; }
.list-item:active { background: var(--hover); }
.item-checkbox { margin-right: 16px; width: 22px; height: 22px; accent-color: var(--primary); cursor: pointer; }
.item-icon { width: 40px; height: 40px; background: #fee2e2; color: #ef4444; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 16px; flex-shrink: 0; }
.item-details { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.item-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; color: var(--text); }
.item-date { font-size: 12px; color: var(--text-secondary); }

/* FAB */
.fab { position: fixed; bottom: 24px; right: 24px; background: var(--primary); color: white; border: none; border-radius: 16px; padding: 16px 20px; box-shadow: 0 4px 12px rgba(18, 165, 148, 0.4); display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 100; font-weight: 600; font-size: 15px; transition: all 0.2s; }
.fab:active { transform: scale(0.95); box-shadow: 0 2px 6px rgba(18, 165, 148, 0.4); }
.fab svg { margin-right: 8px; }
.fab.visible { display: flex; animation: fadeInUp 0.3s ease-out; }

/* Modal */
#preview-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; }
#preview-modal.active { display: flex; }
.preview-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); color: white; position: absolute; top: 0; left: 0; width: 100%; z-index: 1001; }
.preview-header h2 { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; margin: 0 16px; text-align: center; }
.preview-close { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.preview-content { flex: 1; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #f0f2f5; padding-top: 56px; }
.preview-content iframe { width: 100%; height: 100%; border: none; }

/* Loader & Empty State */
.loader { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px solid var(--hover); border-top: 3px solid var(--primary); border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; z-index: 50; }
@keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
.loader.active { display: block; }
.empty-state { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); text-align: center; padding: 24px; }
.empty-state.active { display: flex; }
.empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; color: var(--primary); }
</style>
</head>

<script>
(function() {
  const API_KEY = 'AIzaSyArqTTfzTDBz7ypBo0_S0xSRXvM0Dwh46k';
  const ROW_HEIGHT = 72;
  const CACHE_VERSION = 1;
  const DB_NAME = 'InvoiceManagerDB';
  const STORE_NAME = 'invoices';
  const USERS = {
    'admin@gmail.com': 'ALL',
    'hon@gmail.com': '1KeVAXhbl5Cv4f5v0bvFhGHsvrOuDZ7zq',
    'tham@gmail.com': '15bb8IU1B-tz9xBBYW75L5Gry6QHJamqM',
    'minhphu@gmail.com': '1g4zNEkSU19Rbi1wVNBfxDYDaNTodzL9w',
    'toan@gmail.com': '1XH2P7nfrqVBk_4bm7bTBfGVhxCxrBmrr',
    'trongphu@gmail.com': '1Oc_FYMf5BZo_A0Bimvz_x9TeI9qr-0lR',
    'duy@gmail.com': '1oP8_o_bmwSuIfY2Ff86HzWhoz5bxMTXO',
    'nha@gmail.com': '1RRYvZdjOomtqVMOHaU5d4Vd2xw90GpEM',
    'danh@gmail.com': '1yvr4h6cDFrKowMT7z86GHfGq9ocAYsuB',
    'phuoc@gmail.com': '1O8hy0t4i06pyrNemk1aj6cMxho8rXRDs',
    'viet@gmail.com': '1wVv8shYpGHgj6FkfEcPSrPvESk6TsrK2'
  };
  
  let currentUser = null;
  let currentFolderId = null;
  let allFiles = [];
  let filteredFiles = [];
  let selectedFiles = new Set();
  let db = null;
  let currentFilter = 'all';
  
  const loginScreen = document.getElementById('login-screen');
  const appScreen = document.getElementById('app-screen');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('login-btn');
  const loginError = document.getElementById('login-error');
  const logoutBtn = document.getElementById('logout-btn');
  const refreshBtn = document.getElementById('refresh-btn');
  const searchInput = document.getElementById('search-input');
  const listContainer = document.getElementById('list-container');
  const listPhantom = document.getElementById('list-phantom');
  const listContent = document.getElementById('list-content');
  const shareBtn = document.getElementById('share-btn');
  const previewModal = document.getElementById('preview-modal');
  const previewClose = document.getElementById('preview-close');
  const previewTitle = document.getElementById('preview-title');
  const previewContent = document.getElementById('preview-content');
  const appLoader = document.getElementById('app-loader');
  const emptyState = document.getElementById('empty-state');
  const filterChips = document.querySelectorAll('.filter-chip');

  function initDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, CACHE_VERSION);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => { db = request.result; resolve(); };
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          store.createIndex('folderId', 'folderId', { unique: false });
          store.createIndex('normalizedName', 'normalizedName', { unique: false });
          store.createIndex('modifiedTime', 'modifiedTime', { unique: false });
        }
      };
    });
  }

  async function getCachedFiles(folderId) {
    return new Promise((resolve, reject) => {
      if (!db) return resolve([]);
      const transaction = db.transaction([STORE_NAME], 'readonly');
      const store = transaction.objectStore(STORE_NAME);
      const request = store.getAll();
      request.onsuccess = () => {
        const files = request.result;
        if (folderId === 'ALL') resolve(files);
        else resolve(files.filter(f => f.folderId === folderId));
      };
      request.onerror = () => reject(request.error);
    });
  }

  async function saveFilesToCache(files, folderId) {
    return new Promise((resolve, reject) => {
      if (!db) return resolve();
      const transaction = db.transaction([STORE_NAME], 'readwrite');
      const store = transaction.objectStore(STORE_NAME);
      const clearReq = store.getAll();
      clearReq.onsuccess = () => {
        const existing = clearReq.result;
        existing.forEach(f => {
          if (folderId === 'ALL' || f.folderId === folderId) {
            store.delete(f.id);
          }
        });
        files.forEach(file => {
          file.folderId = folderId;
          store.put(file);
        });
      };
      transaction.oncomplete = () => resolve();
      transaction.onerror = () => reject(transaction.error);
    });
  }

  function removeAccents(str) {
    return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
  }

  async function fetchDriveFiles(folderId, pageToken = '') {
    const query = folderId === 'ALL' 
      ? "mimeType='application/pdf' and trashed=false" 
      : "'" + folderId + "' in parents and mimeType='application/pdf' and trashed=false";
    let url = 'https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(query) + '&fields=nextPageToken,files(id,name,modifiedTime)&pageSize=1000&orderBy=modifiedTime desc&key=' + API_KEY;
    if (pageToken) {
      url += '&pageToken=' + pageToken;
    }
    
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', url);
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          resolve(JSON.parse(xhr.responseText));
        } else {
          reject(new Error('Drive API Error: ' + xhr.statusText));
        }
      };
      xhr.onerror = () => reject(new Error('Network Error'));
      xhr.send();
    });
  }

  async function loadFiles(forceRefresh = false) {
    appLoader.classList.add('active');
    listContent.innerHTML = '';
    emptyState.classList.remove('active');
    try {
      if (!forceRefresh) {
        const cached = await getCachedFiles(currentFolderId);
        if (cached && cached.length > 0) {
          allFiles = cached;
          applySearchAndFilter();
          appLoader.classList.remove('active');
          return;
        }
      }
      let files = [];
      let pageToken = '';
      do {
        const data = await fetchDriveFiles(currentFolderId, pageToken);
        if (!data.files) break;
        const processed = data.files.map(f => ({
          id: f.id,
          name: f.name,
          modifiedTime: new Date(f.modifiedTime).getTime(),
          normalizedName: removeAccents(f.name)
        }));
        files = files.concat(processed);
        pageToken = data.nextPageToken;
      } while (pageToken);
      allFiles = files;
      await saveFilesToCache(allFiles, currentFolderId);
      applySearchAndFilter();
    } catch (error) {
      console.error(error);
      alert('Không thể tải dữ liệu. Vui lòng kiểm tra kết nối mạng.');
    } finally {
      appLoader.classList.remove('active');
    }
  }

  let renderTimeout;
  let lastStartIndex = -1;
  let lastEndIndex = -1;

  function renderVisibleItems() {
    const scrollTop = listContainer.scrollTop;
    const viewportHeight = listContainer.clientHeight;
    const startIndex = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - 5);
    const endIndex = Math.min(filteredFiles.length, Math.ceil((scrollTop + viewportHeight) / ROW_HEIGHT) + 5);
    listPhantom.style.height = (filteredFiles.length * ROW_HEIGHT) + 'px';
    
    if (startIndex === lastStartIndex && endIndex === lastEndIndex) return;
    lastStartIndex = startIndex;
    lastEndIndex = endIndex;

    const fragment = document.createDocumentFragment();
    for (let i = startIndex; i < endIndex; i++) {
      const file = filteredFiles[i];
      const item = document.createElement('div');
      item.className = 'list-item';
      item.style.top = (i * ROW_HEIGHT) + 'px';
      const isSelected = selectedFiles.has(file.id);
      
      const dateObj = new Date(file.modifiedTime);
      const dateStr = dateObj.toLocaleDateString('vi-VN') + ' ' + dateObj.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});
      
      item.innerHTML = `
        <input type="checkbox" class="item-checkbox" ${isSelected ? 'checked' : ''} data-id="${file.id}">
        <div class="item-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        </div>
        <div class="item-details" data-id="${file.id}" data-name="${file.name}">
          <div class="item-name">${file.name}</div>
          <div class="item-date">Cập nhật: ${dateStr}</div>
        </div>
      `;
      fragment.appendChild(item);
    }
    listContent.innerHTML = '';
    listContent.appendChild(fragment);
    
    const checkboxes = listContent.querySelectorAll('.item-checkbox');
    checkboxes.forEach(cb => {
      cb.addEventListener('change', (e) => {
        if (e.target.checked) selectedFiles.add(e.target.dataset.id);
        else selectedFiles.delete(e.target.dataset.id);
        updateShareButton();
      });
    });
    
    const details = listContent.querySelectorAll('.item-details');
    details.forEach(d => {
      d.addEventListener('click', () => openPreview(d.dataset.id, d.dataset.name));
    });
  }

  listContainer.addEventListener('scroll', () => {
    if (renderTimeout) cancelAnimationFrame(renderTimeout);
    renderTimeout = requestAnimationFrame(renderVisibleItems);
  });

  function applySearchAndFilter() {
    const query = removeAccents(searchInput.value.trim());
    const now = Date.now();
    let timeLimit = 0;
    if (currentFilter === 'recent') timeLimit = now - (7 * 24 * 60 * 60 * 1000);
    else if (currentFilter === 'month') timeLimit = now - (30 * 24 * 60 * 60 * 1000);
    
    filteredFiles = allFiles.filter(f => {
      const matchQuery = !query || f.normalizedName.includes(query);
      const matchTime = !timeLimit || f.modifiedTime >= timeLimit;
      return matchQuery && matchTime;
    });
    
    lastStartIndex = -1;
    lastEndIndex = -1;
    
    if (filteredFiles.length === 0) {
      emptyState.classList.add('active');
      listPhantom.style.height = '0px';
      listContent.innerHTML = '';
    } else {
      emptyState.classList.remove('active');
      renderVisibleItems();
    }
  }

  searchInput.addEventListener('input', () => {
    applySearchAndFilter();
  });

  filterChips.forEach(chip => {
    chip.addEventListener('click', () => {
      filterChips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentFilter = chip.id.replace('filter-', '');
      applySearchAndFilter();
    });
  });

  function updateShareButton() {
    if (selectedFiles.size >= 1 && selectedFiles.size <= 3) {
      shareBtn.classList.add('visible');
    } else {
      shareBtn.classList.remove('visible');
    }
  }

  shareBtn.addEventListener('click', async () => {
    if (selectedFiles.size === 0 || selectedFiles.size > 3) return;
    const filesToShare = Array.from(selectedFiles).map(id => {
      const f = allFiles.find(file => file.id === id);
      return { id: f.id, name: f.name };
    });
    const text = filesToShare.map(f => `${f.name}: https://drive.google.com/file/d/${f.id}/view`).join('\n');
    
    if (navigator.share) {
      try {
        await navigator.share({ title: 'Chia sẻ hóa đơn', text: text });
      } catch (err) {
        console.log('Share canceled', err);
      }
    } else {
      navigator.clipboard.writeText(text);
      alert('Đã sao chép liên kết vào khay nhớ tạm!');
    }
    selectedFiles.clear();
    lastStartIndex = -1;
    renderVisibleItems();
    updateShareButton();
  });

  function openPreview(id, name) {
    previewTitle.textContent = name;
    previewContent.innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview" allow="autoplay"></iframe>`;
    previewModal.classList.add('active');
  }

  previewClose.addEventListener('click', () => {
    previewModal.classList.remove('active');
    previewContent.innerHTML = '';
  });






/* ================= LOGIN ================= */

loginBtn.addEventListener('click', async () => {

  const email = emailInput.value.trim().toLowerCase();
  const password = passwordInput.value;

  if (!email || !password) {
    loginError.textContent = 'Vui lòng nhập email và mật khẩu';
    loginError.style.display = 'block';
    return;
  }

  try {

    await auth.signInWithEmailAndPassword(email, password);
    loginError.style.display = 'none';

  } catch (error) {

    loginError.textContent = 'Sai email hoặc mật khẩu';
    loginError.style.display = 'block';

  }

});


/* ================= AUTH STATE ================= */

auth.onAuthStateChanged((user) => {

  if (!user) {

    loginScreen.classList.add('active');
    appScreen.classList.remove('active');

    return;
  }

  const email = user.email.toLowerCase();
  const folderId = USERS[email];

  if (!folderId) {

    loginError.textContent = 'Tài khoản không có quyền truy cập';
    loginError.style.display = 'block';
    auth.signOut();
    return;

  }

  currentUser = email;
  currentFolderId = folderId;

  loginScreen.classList.remove('active');
  appScreen.classList.add('active');

  loadFiles(false);

});


/* ================= LOGOUT ================= */

logoutBtn.addEventListener('click', async () => {

  await auth.signOut();

  currentUser = null;
  currentFolderId = null;

  allFiles = [];
  filteredFiles = [];
  selectedFiles.clear();

  listContent.innerHTML = '';
  searchInput.value = '';

});


/* ================= REFRESH ================= */

refreshBtn.addEventListener('click', () => {

  loadFiles(true);

});


/* ================= INIT ================= */

async function init() {

  await initDB();

}


  



  



  init();
})();
</script>
