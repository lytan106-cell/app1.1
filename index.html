<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Invoice Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<style>
.hide-scroll::-webkit-scrollbar { display: none; }
.hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
#pdfContainer { touch-action: pan-x pan-y; }
</style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans h-screen overflow-hidden flex flex-col selection:bg-blue-200">
<div id="loginScreen" class="flex flex-col h-screen justify-center items-center p-6 bg-white z-20 absolute inset-0">
<h1 class="text-3xl font-bold mb-2">Invoice Manager</h1>
<p class="text-gray-500 mb-8">Sign in to access your documents</p>
<input type="text" id="usernameInput" placeholder="Username" class="w-full max-w-sm border border-gray-300 rounded-lg px-4 py-3 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
<button id="loginBtn" class="w-full max-w-sm bg-blue-600 text-white rounded-lg px-4 py-3 font-semibold active:bg-blue-700 transition">Login</button>
<p id="loginError" class="text-red-500 mt-4 hidden">User not found</p>
<div class="mt-auto pb-4 text-gray-400 text-sm">&copy; Sharker Teddy</div>
</div>
<div id="mainScreen" class="hidden flex flex-col h-screen bg-gray-50 z-10 absolute inset-0">
<div class="bg-white shadow-sm z-10">
<div class="flex justify-between items-center p-4 border-b border-gray-200">
<h1 class="text-xl font-bold">Invoices</h1>
<div>
<button id="refreshBtn" class="text-blue-600 font-medium mr-4 active:text-blue-800">Refresh</button>
<button id="logoutBtn" class="text-gray-600 font-medium active:text-gray-800">Logout</button>
</div>
</div>
<div class="p-4">
<input type="text" id="searchInput" placeholder="Search files..." class="w-full border border-gray-300 rounded-lg px-4 py-2 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
<div class="flex space-x-2 overflow-x-auto pb-1 hide-scroll" id="filterContainer"></div>
</div>
</div>
<div id="scrollContainer" class="flex-1 overflow-y-auto relative">
<div id="scrollContent" class="w-full relative"></div>
</div>
<button id="shareBtn" class="hidden absolute bottom-6 right-6 bg-blue-600 text-white rounded-full p-4 shadow-lg active:bg-blue-700 transition z-50 flex items-center justify-center">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
</button>
</div>
<div id="pdfModal" class="hidden fixed inset-0 bg-black bg-opacity-95 z-50 flex flex-col">
<div class="flex justify-between items-center p-4 text-white border-b border-gray-800">
<div class="space-x-4">
<button id="zoomOut" class="p-2 bg-gray-800 rounded active:bg-gray-700 w-10 h-10 font-bold text-xl">-</button>
<button id="zoomIn" class="p-2 bg-gray-800 rounded active:bg-gray-700 w-10 h-10 font-bold text-xl">+</button>
</div>
<button id="closePdfBtn" class="p-2 bg-gray-800 rounded active:bg-gray-700 w-10 h-10 font-bold">X</button>
</div>
<div class="flex-1 overflow-auto flex justify-center items-start p-4" id="pdfContainer">
<canvas id="pdfCanvas"></canvas>
</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBcZ3XxkLuGnFf7BVI7gL7IlllAuifStFM",
authDomain: "app10-489810.firebaseapp.com",
projectId: "app10-489810",
storageBucket: "app10-489810.firebasestorage.app",
messagingSenderId: "318163955130",
appId: "1:318163955130:web:68a9785bc4fd435b260183"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allFiles = [];
let filteredFiles = [];
let selectedFiles = new Set();
let currentFilter = 'All';
let session = JSON.parse(localStorage.getItem('invoice_session') || 'null');

const loginScreen = document.getElementById('loginScreen');
const mainScreen = document.getElementById('mainScreen');
const usernameInput = document.getElementById('usernameInput');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const refreshBtn = document.getElementById('refreshBtn');
const logoutBtn = document.getElementById('logoutBtn');
const searchInput = document.getElementById('searchInput');
const filterContainer = document.getElementById('filterContainer');
const scrollContainer = document.getElementById('scrollContainer');
const scrollContent = document.getElementById('scrollContent');
const shareBtn = document.getElementById('shareBtn');
const pdfModal = document.getElementById('pdfModal');
const pdfCanvas = document.getElementById('pdfCanvas');
const closePdfBtn = document.getElementById('closePdfBtn');
const zoomIn = document.getElementById('zoomIn');
const zoomOut = document.getElementById('zoomOut');

if (session) initMain();

usernameInput.addEventListener('input', (e) => {
e.target.value = e.target.value.toLowerCase().replace(/\s/g, '');
});

loginBtn.addEventListener('click', async () => {
const username = usernameInput.value;
if (!username) return;

loginBtn.textContent = 'Loading...';
loginBtn.disabled = true;
loginError.classList.add('hidden');

try {
await signInAnonymously(auth);
const q = query(collection(db, "users"), where("username", "==", username));
const snapshot = await getDocs(q);

if (!snapshot.empty) {
const userData = snapshot.docs[0].data();
session = { username, folderId: userData.folderId };
localStorage.setItem('invoice_session', JSON.stringify(session));
initMain();
} else {
loginError.classList.remove('hidden');
}
} catch (err) {
loginError.textContent = 'Error connecting to database';
loginError.classList.remove('hidden');
} finally {
loginBtn.textContent = 'Login';
loginBtn.disabled = false;
}
});

logoutBtn.addEventListener('click', () => {
localStorage.removeItem('invoice_session');
session = null;
allFiles = [];
filteredFiles = [];
selectedFiles.clear();
mainScreen.classList.add('hidden');
loginScreen.classList.remove('hidden');
usernameInput.value = '';
});

async function initMain() {
loginScreen.classList.add('hidden');
mainScreen.classList.remove('hidden');
setupFilters();

const cached = await loadCache();
if (cached && cached.length > 0) {
allFiles = cached;
applyFilters();
} else {
await fetchDriveFiles();
}
}

refreshBtn.addEventListener('click', fetchDriveFiles);

async function fetchDriveFiles() {
if (!session || !session.folderId) return;
refreshBtn.textContent = '...';
try {
const q = `'${session.folderId}' in parents and mimeType='application/pdf' and trashed=false`;
const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name,modifiedTime)&key=${firebaseConfig.apiKey}`;

const res = await fetch(url);
const data = await res.json();

if (data.files) {
allFiles = data.files;
await saveCache(allFiles);
applyFilters();
}
} catch (err) {
alert('Failed to fetch files');
} finally {
refreshBtn.textContent = 'Refresh';
}
}

const DB_NAME = 'InvoiceManagerDB';
const STORE_NAME = 'files';

function getDB() {
return new Promise((resolve, reject) => {
const request = indexedDB.open(DB_NAME, 1);
request.onupgradeneeded = (e) => {
const db = e.target.result;
if (!db.objectStoreNames.contains(STORE_NAME)) {
db.createObjectStore(STORE_NAME, { keyPath: 'id' });
}
};
request.onsuccess = () => resolve(request.result);
request.onerror = () => reject(request.error);
});
}

async function saveCache(files) {
const db = await getDB();
const tx = db.transaction(STORE_NAME, 'readwrite');
const store = tx.objectStore(STORE_NAME);
store.clear();
files.forEach(file => store.put(file));
return new Promise(resolve => tx.oncomplete = resolve);
}

async function loadCache() {
const db = await getDB();
const tx = db.transaction(STORE_NAME, 'readonly');
const store = tx.objectStore(STORE_NAME);
const request = store.getAll();
return new Promise(resolve => {
request.onsuccess = () => resolve(request.result);
});
}

const filters = ['All', 'Today', 'Yesterday', 'Week', 'Month'];

function setupFilters() {
filterContainer.innerHTML = filters.map(f => `
<button class="filter-btn px-4 py-1.5 rounded-full text-sm whitespace-nowrap ${f === currentFilter ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700'}" data-filter="${f}">
${f}
</button>
`).join('');

document.querySelectorAll('.filter-btn').forEach(btn => {
btn.addEventListener('click', (e) => {
currentFilter = e.target.dataset.filter;
setupFilters();
applyFilters();
});
});
}

searchInput.addEventListener('input', applyFilters);

function applyFilters() {
const term = searchInput.value.toLowerCase();
const now = new Date();
const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
const yesterday = today - 86400000;
const week = today - 86400000 * 7;
const month = new Date(now.getFullYear(), now.getMonth() - 1, now.getDate()).getTime();

filteredFiles = allFiles.filter(f => {
if (term && !f.name.toLowerCase().includes(term)) return false;
const t = new Date(f.modifiedTime).getTime();
if (currentFilter === 'Today' && t < today) return false;
if (currentFilter === 'Yesterday' && (t < yesterday || t >= today)) return false;
if (currentFilter === 'Week' && t < week) return false;
if (currentFilter === 'Month' && t < month) return false;
return true;
});

filteredFiles.sort((a, b) => new Date(b.modifiedTime) - new Date(a.modifiedTime));
scrollContainer.scrollTop = 0;
renderList();
}

const itemHeight = 72;

function renderList() {
const scrollTop = scrollContainer.scrollTop;
const viewportHeight = scrollContainer.clientHeight;
const startIndex = Math.max(0, Math.floor(scrollTop / itemHeight) - 3);
const endIndex = Math.min(filteredFiles.length, Math.ceil((scrollTop + viewportHeight) / itemHeight) + 3);

scrollContent.style.height = `${filteredFiles.length * itemHeight}px`;
scrollContent.innerHTML = '';

for (let i = startIndex; i < endIndex; i++) {
const file = filteredFiles[i];
const div = document.createElement('div');
div.className = 'absolute w-full flex items-center p-4 border-b border-gray-200 bg-white cursor-pointer active:bg-gray-50';
div.style.top = `${i * itemHeight}px`;
div.style.height = `${itemHeight}px`;

const cb = document.createElement('input');
cb.type = 'checkbox';
cb.className = 'mr-4 w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500';
cb.checked = selectedFiles.has(file.id);
cb.onclick = (e) => {
e.stopPropagation();
cb.checked ? selectedFiles.add(file.id) : selectedFiles.delete(file.id);
updateShareBtn();
};

const textDiv = document.createElement('div');
textDiv.className = 'flex-1 min-w-0';
textDiv.innerHTML = `
<p class="text-sm font-medium text-gray-900 truncate">${file.name}</p>
<p class="text-xs text-gray-500 truncate">${new Date(file.modifiedTime).toLocaleString()}</p>
`;

div.onclick = () => openPdf(file.id);
div.append(cb, textDiv);
scrollContent.appendChild(div);
}
}

scrollContainer.addEventListener('scroll', renderList);

function updateShareBtn() {
if (selectedFiles.size > 0 && selectedFiles.size <= 3) {
shareBtn.classList.remove('hidden');
} else {
shareBtn.classList.add('hidden');
}
}

shareBtn.addEventListener('click', async () => {
if (selectedFiles.size === 0 || selectedFiles.size > 3) return;

const originalContent = shareBtn.innerHTML;
shareBtn.innerHTML = '<span class="animate-pulse font-bold">...</span>';

try {
const filesToShare = [];
for (const id of selectedFiles) {
const fileMeta = allFiles.find(f => f.id === id);
const res = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media&key=${firebaseConfig.apiKey}`);
const blob = await res.blob();
filesToShare.push(new File([blob], fileMeta.name, { type: 'application/pdf' }));
}

if (navigator.canShare && navigator.canShare({ files: filesToShare })) {
await navigator.share({ files: filesToShare, title: 'Shared Invoices' });
} else {
alert('Sharing files is not supported on this browser.');
}
} catch (err) {
alert('Error preparing files for share.');
}

shareBtn.innerHTML = originalContent;
});

let pdfDoc = null;
let scale = 1.0;

async function openPdf(fileId) {
pdfModal.classList.remove('hidden');
const ctx = pdfCanvas.getContext('2d');
ctx.clearRect(0, 0, pdfCanvas.width, pdfCanvas.height);

try {
const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${firebaseConfig.apiKey}`;
pdfDoc = await pdfjsLib.getDocument(url).promise;
scale = 1.0;
renderPdf();
} catch (err) {
alert('Failed to load PDF');
pdfModal.classList.add('hidden');
}
}

async function renderPdf() {
if (!pdfDoc) return;
const page = await pdfDoc.getPage(1);
const viewport = page.getViewport({ scale });
pdfCanvas.height = viewport.height;
pdfCanvas.width = viewport.width;
await page.render({ canvasContext: pdfCanvas.getContext('2d'), viewport }).promise;
}

zoomIn.addEventListener('click', () => {
scale += 0.25;
renderPdf();
});

zoomOut.addEventListener('click', () => {
scale = Math.max(0.5, scale - 0.25);
renderPdf();
});

closePdfBtn.addEventListener('click', () => {
pdfModal.classList.add('hidden');
pdfDoc = null;
});
</script>
</body>
</html>
