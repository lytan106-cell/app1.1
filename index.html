<style>
:root {
  --primary: #12a594;
  --primary-dark: #0e8274;
  --surface: #ffffff;
  --background: #f4f6f8;
  --text: #1f2937;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --error: #ef4444;
  --hover: #f3f4f6;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
body { background-color: var(--background); color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }
.screen { display: none; height: 100%; width: 100%; flex-direction: column; position: absolute; top: 0; left: 0; }
.screen.active { display: flex; }

/* Login Screen - Premium UI */
#login-screen { 
  align-items: center; 
  justify-content: space-between; 
  padding: 0 24px; 
  background: linear-gradient(135deg, #e0f2f1 0%, #ffffff 100%);
}
.login-logo-wrapper {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  animation: fadeInDown 0.6s ease-out;
  padding-top: 20px;
}
.login-logo {
  width: 280px;
  max-width: 85%;
  height: auto;
  object-fit: contain;
}
.login-container { 
  width: 100%; 
  max-width: 400px; 
  display: flex; 
  flex-direction: column; 
  gap: 24px; 
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  padding: 40px 24px;
  border-radius: 24px;
  box-shadow: 0 10px 40px rgba(18, 165, 148, 0.1);
  border: 1px solid rgba(255,255,255,0.8);
  animation: fadeInUp 0.6s ease-out;
  flex: 0 0 auto;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
.login-header { text-align: center; }
.login-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
.login-header p { color: var(--text-secondary); font-size: 14px; }
.input-group { display: flex; flex-direction: column; gap: 8px; }
.input-group input { 
  padding: 16px; 
  border: 1px solid var(--border); 
  border-radius: 12px; 
  font-size: 16px; 
  outline: none; 
  background: #f8f9fa;
  transition: all 0.3s ease;
}
.input-group input:focus { 
  background: var(--surface);
  border-color: var(--primary); 
  box-shadow: 0 0 0 4px rgba(18, 165, 148, 0.1);
}
.btn { 
  padding: 16px 24px; 
  border: none; 
  border-radius: 12px; 
  font-size: 16px; 
  font-weight: 600; 
  cursor: pointer; 
  text-align: center; 
  transition: all 0.3s ease;
}
.btn-primary { 
  background: var(--primary); 
  color: white; 
  box-shadow: 0 4px 12px rgba(18, 165, 148, 0.3);
}
.btn-primary:active { 
  background: var(--primary-dark); 
  transform: translateY(2px);
  box-shadow: 0 2px 6px rgba(18, 165, 148, 0.3);
}
.login-footer { 
  flex: 1;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 24px;
  width: 100%;
  color: var(--text-secondary); 
  font-size: 14px; 
  font-weight: 500;
}
#login-error { color: var(--error); font-size: 14px; text-align: center; display: none; background: #fee2e2; padding: 12px; border-radius: 8px; }

/* Main App Screen */
.app-header { background: var(--surface); padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; z-index: 10; }
.top-bar { display: flex; justify-content: space-between; align-items: center; }
.icon-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.icon-btn:active { background: var(--hover); }
.search-container { position: relative; }
.search-container input { width: 100%; padding: 12px 16px 12px 44px; border: 1px solid var(--border); border-radius: 24px; font-size: 16px; outline: none; background: var(--hover); transition: all 0.3s; }
.search-container input:focus { background: var(--surface); border-color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
.filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.filter-chip { padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; font-weight: 500; white-space: nowrap; background: var(--surface); cursor: pointer; transition: all 0.2s; color: var(--text-secondary); }
.filter-chip.active { background: #e0f2f1; color: var(--primary-dark); border-color: var(--primary); }

/* Virtual List */
.list-container { flex: 1; overflow-y: auto; position: relative; -webkit-overflow-scrolling: touch; }
.list-phantom { position: absolute; top: 0; left: 0; width: 100%; z-index: -1; }
.list-content { position: absolute; top: 0; left: 0; width: 100%; }
.list-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); position: absolute; width: 100%; height: 72px; box-sizing: border-box; cursor: pointer; transition: background 0.2s; }
.list-item:active { background: var(--hover); }
.item-checkbox { margin-right: 16px; width: 22px; height: 22px; accent-color: var(--primary); cursor: pointer; }
.item-icon { width: 40px; height: 40px; background: #fee2e2; color: #ef4444; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 16px; flex-shrink: 0; }
.item-details { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.item-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; color: var(--text); }
.item-date { font-size: 12px; color: var(--text-secondary); }

/* FAB */
.fab { position: fixed; bottom: 24px; right: 24px; background: var(--primary); color: white; border: none; border-radius: 16px; padding: 16px 20px; box-shadow: 0 4px 12px rgba(18, 165, 148, 0.4); display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 100; font-weight: 600; font-size: 15px; transition: all 0.2s; }
.fab:active { transform: scale(0.95); box-shadow: 0 2px 6px rgba(18, 165, 148, 0.4); }
.fab svg { margin-right: 8px; }
.fab.visible { display: flex; animation: fadeInUp 0.3s ease-out; }

/* Modal */
#preview-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; }
#preview-modal.active { display: flex; }
.preview-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); color: white; position: absolute; top: 0; left: 0; width: 100%; z-index: 1001; }
.preview-header h2 { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; margin: 0 16px; text-align: center; }
.preview-close { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.preview-content { flex: 1; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #f0f2f5; padding-top: 56px; }
.preview-content iframe { width: 100%; height: 100%; border: none; }

/* Loader & Empty State */
.loader { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px solid var(--hover); border-top: 3px solid var(--primary); border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; z-index: 50; }
@keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
.loader.active { display: block; }
.empty-state { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); text-align: center; padding: 24px; }
.empty-state.active { display: flex; }
.empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; color: var(--primary); }
</style>
</head>

<script>
<script>
(function(){

/* ================= CONFIG ================= */

const CONFIG={
API_KEY:"AIzaSyArqTTfzTDBz7ypBo0_S0xSRXvM0Dwh46k",
ROW_HEIGHT:72,
PAGE_SIZE:1000,
DB_NAME:"InvoiceManagerDB",
STORE:"invoices",
CACHE_VERSION:2
}

/* ================= USERS ================= */

const USERS={
"admin@gmail.com":"ALL",
"hon@gmail.com":"1KeVAXhbl5Cv4f5v0bvFhGHsvrOuDZ7zq",
"tham@gmail.com":"15bb8IU1B-tz9xBBYW75L5Gry6QHJamqM",
"minhphu@gmail.com":"1g4zNEkSU19Rbi1wVNBfxDYDaNTodzL9w",
"toan@gmail.com":"1XH2P7nfrqVBk_4bm7bTBfGVhxCxrBmrr",
"trongphu@gmail.com":"1Oc_FYMf5BZo_A0Bimvz_x9TeI9qr-0lR",
"duy@gmail.com":"1oP8_o_bmwSuIfY2Ff86HzWhoz5bxMTXO",
"nha@gmail.com":"1RRYvZdjOomtqVMOHaU5d4Vd2xw90GpEM",
"danh@gmail.com":"1yvr4h6cDFrKowMT7z86GHfGq9ocAYsuB",
"phuoc@gmail.com":"1O8hy0t4i06pyrNemk1aj6cMxho8rXRDs",
"viet@gmail.com":"1wVv8shYpGHgj6FkfEcPSrPvESk6TsrK2"
}

/* ================= STATE ================= */

let db=null
let currentUser=null
let currentFolder=null

let allFiles=[]
let filteredFiles=[]
let selected=new Set()

let lastStart=-1
let lastEnd=-1
let loading=false

/* ================= DOM ================= */

const loginScreen=document.getElementById("login-screen")
const appScreen=document.getElementById("app-screen")

const emailInput=document.getElementById("email")
const passwordInput=document.getElementById("password")
const loginBtn=document.getElementById("login-btn")
const loginError=document.getElementById("login-error")

const logoutBtn=document.getElementById("logout-btn")
const refreshBtn=document.getElementById("refresh-btn")

const searchInput=document.getElementById("search-input")

const listContainer=document.getElementById("list-container")
const listContent=document.getElementById("list-content")
const listPhantom=document.getElementById("list-phantom")

const shareBtn=document.getElementById("share-btn")

const previewModal=document.getElementById("preview-modal")
const previewTitle=document.getElementById("preview-title")
const previewContent=document.getElementById("preview-content")
const previewClose=document.getElementById("preview-close")

const loader=document.getElementById("app-loader")
const emptyState=document.getElementById("empty-state")

/* ================= UTILS ================= */

function normalize(str){

return str
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.toLowerCase()

}

/* ================= INDEXED DB ================= */

function initDB(){

return new Promise((res,rej)=>{

const req=indexedDB.open(CONFIG.DB_NAME,CONFIG.CACHE_VERSION)

req.onupgradeneeded=e=>{

const db=e.target.result

if(!db.objectStoreNames.contains(CONFIG.STORE)){

const store=db.createObjectStore(CONFIG.STORE,{keyPath:"id"})
store.createIndex("folder","folder")

}

}

req.onsuccess=e=>{
db=e.target.result
res()
}

req.onerror=rej

})

}

/* ================= DRIVE ================= */

async function fetchDrive(folder,pageToken=""){

let query=folder==="ALL"
? "mimeType='application/pdf' and trashed=false"
: `'${folder}' in parents and mimeType='application/pdf' and trashed=false`

let url=`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=nextPageToken,files(id,name,modifiedTime)&pageSize=${CONFIG.PAGE_SIZE}&orderBy=modifiedTime desc&key=${CONFIG.API_KEY}`

if(pageToken) url+="&pageToken="+pageToken

const res=await fetch(url)

if(!res.ok) throw new Error("Drive API error")

return res.json()

}

/* ================= LOAD FILE ================= */

async function loadFiles(force=false){

if(loading) return
loading=true

loader.classList.add("active")

try{

let files=[]
let token=""

do{

const data=await fetchDrive(currentFolder,token)

if(!data.files) break

files=files.concat(

data.files.map(f=>({

id:f.id,
name:f.name,
normalized:normalize(f.name),
modified:new Date(f.modifiedTime).getTime()

}))

)

token=data.nextPageToken

}while(token)

allFiles=files

applyFilter()

}catch(e){

console.error(e)
alert("Không thể tải dữ liệu")

}

loader.classList.remove("active")
loading=false

}

/* ================= FILTER ================= */

function applyFilter(){

const q=normalize(searchInput.value.trim())

filteredFiles=allFiles.filter(f=>!q||f.normalized.includes(q))

if(filteredFiles.length===0){

emptyState.classList.add("active")
listContent.innerHTML=""
listPhantom.style.height="0px"

}else{

emptyState.classList.remove("active")
render()

}

}

/* ================= VIRTUAL LIST ================= */

function render(){

listPhantom.style.height=(filteredFiles.length*CONFIG.ROW_HEIGHT)+"px"

draw()

}

function draw(){

const scroll=listContainer.scrollTop
const height=listContainer.clientHeight

let start=Math.floor(scroll/CONFIG.ROW_HEIGHT)-5
let end=Math.ceil((scroll+height)/CONFIG.ROW_HEIGHT)+5

start=Math.max(0,start)
end=Math.min(filteredFiles.length,end)

if(start===lastStart && end===lastEnd) return

lastStart=start
lastEnd=end

let html=""

for(let i=start;i<end;i++){

const f=filteredFiles[i]
const checked=selected.has(f.id)?"checked":""

html+=`
<div class="list-item" style="top:${i*CONFIG.ROW_HEIGHT}px">

<input type="checkbox" class="item-checkbox" data-id="${f.id}" ${checked}>

<div class="item-details" data-id="${f.id}" data-name="${f.name}">
<div class="item-name">${f.name}</div>
</div>

</div>
`

}

listContent.innerHTML=html

}

/* ================= EVENT DELEGATION ================= */

listContent.addEventListener("click",e=>{

const detail=e.target.closest(".item-details")

if(detail){

openPreview(detail.dataset.id,detail.dataset.name)

}

})

listContent.addEventListener("change",e=>{

if(e.target.classList.contains("item-checkbox")){

const id=e.target.dataset.id

if(e.target.checked) selected.add(id)
else selected.delete(id)

updateShare()

}

})

/* ================= SHARE ================= */

function updateShare(){

if(selected.size>0 && selected.size<=3)
shareBtn.classList.add("visible")
else
shareBtn.classList.remove("visible")

}

shareBtn.onclick=()=>{

const links=[...selected].map(id=>{

const f=allFiles.find(x=>x.id===id)
return `${f.name}\nhttps://drive.google.com/file/d/${f.id}/view`

}).join("\n\n")

navigator.clipboard.writeText(links)

alert("Đã copy link")

selected.clear()

render()
updateShare()

}

/* ================= PREVIEW ================= */

function openPreview(id,name){

previewTitle.textContent=name

previewContent.innerHTML=
`<iframe src="https://drive.google.com/file/d/${id}/preview"></iframe>`

previewModal.classList.add("active")

}

previewClose.onclick=()=>{

previewModal.classList.remove("active")
previewContent.innerHTML=""

}

/* ================= LOGIN ================= */

loginBtn.onclick=async()=>{

const email=emailInput.value.trim().toLowerCase()
const pass=passwordInput.value

if(!email||!pass){

loginError.textContent="Nhập email và mật khẩu"
loginError.style.display="block"
return

}

try{

await auth.signInWithEmailAndPassword(email,pass)
loginError.style.display="none"

}catch(e){

loginError.textContent="Sai tài khoản"
loginError.style.display="block"

}

}

/* ================= AUTH ================= */

auth.onAuthStateChanged(async user=>{

if(!user){

loginScreen.classList.add("active")
appScreen.classList.remove("active")
return

}

const email=user.email.toLowerCase()

const folder=USERS[email]

if(!folder){

auth.signOut()
alert("Không có quyền")
return

}

currentUser=email
currentFolder=folder

loginScreen.classList.remove("active")
appScreen.classList.add("active")

await loadFiles()

})

/* ================= EVENTS ================= */

searchInput.addEventListener("input",applyFilter)

logoutBtn.onclick=()=>auth.signOut()

refreshBtn.onclick=()=>loadFiles(true)

listContainer.addEventListener("scroll",()=>{

requestAnimationFrame(draw)

})

/* ================= INIT ================= */

initDB()

})()
</script>
})();
</script>
</body>
